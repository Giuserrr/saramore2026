backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "data"
    label: "Gestione Sito"
    files:
      - name: "classes"
        label: "Gestione Classi"
        file: "classes.json"
        fields:
          - name: "classes"
            label: "Lista Classi"
            widget: "list"
            fields:
              - {label: "Nome Classe", name: "name", widget: "string"}
              - {label: "Giorno (es. Lunedì)", name: "day", widget: "select", options: ["Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato", "Domenica"]}
              - {label: "Orario (es. 09:00 - 10:15)", name: "time", widget: "string"}
              - {label: "Sede", name: "location", widget: "select", options: ["Piazza Alessi 2/3 — Studio Equilibra", "Via Fieschi 20 — Dojo Jakukai"]}
              - {label: "Posti Massimi", name: "maxSpots", widget: "number", value_type: "int", min: 1, max: 50}
              - {label: "Attiva", name: "active", widget: "boolean", default: true}
              - {label: "Descrizione", name: "desc", widget: "text"}

      - name: "events"
        label: "Gestione Eventi"
        file: "events.json"
        fields:
          - name: "events"
            label: "Lista Eventi"
            widget: "list"
            fields:
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "Data (es. 24 Maggio - Ore 18:00)", name: "date", widget: "string", hint: "Per il riconoscimento automatico della data nella SEO, includi sempre giorno + mese in italiano e — se possibile — l'orario nel formato 'Ore HH:MM' o 'HH:MM'."}
              - {label: "Luogo", name: "location", widget: "string"}
              - {label: "Prezzo", name: "price", widget: "string"}
              - {label: "Attivo", name: "active", widget: "boolean", default: true}
              - {label: "Link Stripe", name: "stripeLink", widget: "string", required: false}
              - {label: "Locandina", name: "image", widget: "image"}
              - {label: "Descrizione", name: "desc", widget: "text"}

  - name: "blog"
    label: "Blog (articoli)"
    folder: "blog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Data di pubblicazione", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "Pubblicato", name: "published", widget: "boolean", default: false}
      - {label: "Sommario (max 200 caratteri)", name: "summary", widget: "text"}
      - {label: "Immagine di copertina", name: "cover", widget: "image", required: false}
      - {label: "Tags", name: "tags", widget: "list", default: ["yoga"], required: false}
      - {label: "Contenuto", name: "body", widget: "markdown"}
